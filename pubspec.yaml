name: smart_labour
description: "Smart Labour Marketplace Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  icons_plus: ^4.0.0
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.0
  intl: ^0.19.0
  geolocator: ^13.0.0
  geocoding: ^3.0.0
  url_launcher: ^6.3.2
  firebase_storage: ^12.1.0
  image_picker: ^1.1.2
  http: ^1.6.0
  flutter_stripe: ^11.0.0
  flutter_stripe_web: ^6.5.1
  cloud_functions: ^5.6.2
  shared_preferences: ^2.5.5
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  animate_do: ^5.1.0
  lottie: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
